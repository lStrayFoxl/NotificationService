services:
  php:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: base
    user: "${UID:-1000}:${GID:-1000}"
    tty: true
    env_file:
      - ./project/.env
    working_dir: /var/www/project
    volumes:
      - ./:/var/www
      - ./project:/var/www/project
    links:
      - redis
    profiles:
      - dev
    restart: unless-stopped
    networks:
      - laravel-development
    depends_on:
      postgres:
        condition: service_started


  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=notification_service
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres-data-development:/var/lib/postgresql
    networks:
      - laravel-development


  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "8080:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=demo@example.com
      - PGADMIN_DEFAULT_PASSWORD=secret
      - PGADMIN_SERVER_DEFAULT_GROUP=Local
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    volumes:
      - pgadmin-data:/root/.pgadmin
    networks:
      - laravel-development
    depends_on:
      - postgres


  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - laravel-development


  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - laravel-development


  web:
    image: nginx:latest
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    environment:
      - NGINX_HOST=localhost
    networks:
      - laravel-development
    restart: unless-stopped

networks:
  laravel-development:

volumes:
  postgres-data-development:
  rabbitmq-data:
  pgadmin-data: